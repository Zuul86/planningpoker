AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  planning-poker

  SAM Template for planning-poker API Gateway and Lambdas

Globals:
  Function:
    Timeout: 3

Resources:
  PlanningPokerWebsocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: PlanningPokerWebsocketApi
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  # Lambda Functions
  JoinTableFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/jointable/
      Handler: index.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - index.ts
  
  DisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/disconnect/
      Handler: index.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - index.ts

  ResetVoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/reset-vote/
      Handler: index.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - index.ts

  RevealEffortsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/reveal-efforts/
      Handler: index.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - index.ts
  
  UserJoinedFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/user-joined/
      Handler: index.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - index.ts

  UserVotedFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/user-voted/
      Handler: index.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - index.ts
  
  # --- WebSocket Integrations, Routes, and Permissions ---

  # 1. JoinTable
  JoinIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PlanningPokerWebsocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${JoinTableFunction.Arn}/invocations"

  JoinRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PlanningPokerWebsocketApi
      RouteKey: join-table
      Target: !Join [ "/", [ "integrations", !Ref JoinIntegration ] ]

  JoinPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref JoinTableFunction
      Principal: apigateway.amazonaws.com

  # 2. Disconnect
  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PlanningPokerWebsocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DisconnectFunction.Arn}/invocations"

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PlanningPokerWebsocketApi
      RouteKey: $disconnect
      Target: !Join [ "/", [ "integrations", !Ref DisconnectIntegration ] ]

  DisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DisconnectFunction
      Principal: apigateway.amazonaws.com

  # 6. ResetVote
  ResetVoteIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PlanningPokerWebsocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ResetVoteFunction.Arn}/invocations"

  ResetVoteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PlanningPokerWebsocketApi
      RouteKey: reset-vote
      Target: !Join [ "/", [ "integrations", !Ref ResetVoteIntegration ] ]

  ResetVotePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ResetVoteFunction
      Principal: apigateway.amazonaws.com

  # 8. RevealEfforts
  RevealEffortsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PlanningPokerWebsocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RevealEffortsFunction.Arn}/invocations"

  RevealEffortsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PlanningPokerWebsocketApi
      RouteKey: reveal-efforts
      Target: !Join [ "/", [ "integrations", !Ref RevealEffortsIntegration ] ]

  RevealEffortsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref RevealEffortsFunction
      Principal: apigateway.amazonaws.com

  # 9. UserJoined
  UserJoinedIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PlanningPokerWebsocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UserJoinedFunction.Arn}/invocations"

  UserJoinedRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PlanningPokerWebsocketApi
      RouteKey: user-joined
      Target: !Join [ "/", [ "integrations", !Ref UserJoinedIntegration ] ]

  UserJoinedPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref UserJoinedFunction
      Principal: apigateway.amazonaws.com

  # 10. UserVoted
  UserVotedIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PlanningPokerWebsocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UserVotedFunction.Arn}/invocations"

  UserVotedRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PlanningPokerWebsocketApi
      RouteKey: user-voted
      Target: !Join [ "/", [ "integrations", !Ref UserVotedIntegration ] ]

  UserVotedPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref UserVotedFunction
      Principal: apigateway.amazonaws.com

  Deployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - JoinRoute
      - DisconnectRoute
      - ResetVoteRoute
      - RevealEffortsRoute
      - UserJoinedRoute
      - UserVotedRoute
    Properties:
      ApiId: !Ref PlanningPokerWebsocketApi

  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      StageName: production
      Description: Prod Stage
      DeploymentId: !Ref Deployment
      ApiId: !Ref PlanningPokerWebsocketApi

Outputs:
  WebSocketURI:
    Description: "The WSS Protocol URI to connect to"
    Value: !Sub "wss://${PlanningPokerWebsocketApi}.execute-api.${AWS::Region}.amazonaws.com/production"
