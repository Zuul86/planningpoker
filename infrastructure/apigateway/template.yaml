AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  planning-poker

  SAM Template for planning-poker API Gateway and Lambdas

Globals:
  Function:
    Timeout: 3

Resources:
  PlanningPokerWebsocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: PlanningPokerWebsocketApi
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  ApiGatewayEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/apiGatewayEvents/
      Handler: index.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Policies:
        - DynamoDBCrudPolicy:
            TableName: "PlanningPokerTable"
        - DynamoDBCrudPolicy:
            TableName: "PlanningPokerVote"
        - ArnFullAccess:
            Arn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PlanningPokerWebsocketApi}/*"
      Events:
        Connect:
          Type: ApiGatewayWebsocketApi
          Properties:
            ApiId: !Ref PlanningPokerWebsocketApi
            RouteKey: $connect
        Disconnect:
          Type: ApiGatewayWebsocketApi
          Properties:
            ApiId: !Ref PlanningPokerWebsocketApi
            RouteKey: $disconnect
        DefaultRoute:
          Type: ApiGatewayWebsocketApi
          Properties:
            ApiId: !Ref PlanningPokerWebsocketApi
            RouteKey: $default
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2022"
        Sourcemap: true
        EntryPoints:
          - index.ts
  
  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      StageName: production
      Description: Prod Stage
      ApiId: !Ref PlanningPokerWebsocketApi
      AutoDeploy: true

Outputs:
  WebSocketURI:
    Description: "The WSS Protocol URI to connect to"
    Value: !Sub "wss://${PlanningPokerWebsocketApi}.execute-api.${AWS::Region}.amazonaws.com/production"
