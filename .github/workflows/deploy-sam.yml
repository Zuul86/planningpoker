name: Deploy SAM Application

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          
      - name: Install esbuild globally
        run: npm install -g esbuild
        
      - uses: aws-actions/setup-sam@v2
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
          
      - name: SAM Build
        run: sam build --template-file infrastructure/apigateway/template.yaml --build-in-source --cached

      - name: SAM Deploy
        run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --resolve-s3 --stack-name planning-poker-stack --capabilities CAPABILITY_IAM
